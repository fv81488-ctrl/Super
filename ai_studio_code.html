<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معلومات الطالب</title>
    <style>
        /* إعدادات بسيطة لجعل الصفحة نظيفة وعرض الصورة بشكل مناسب */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4; /* لون خلفية رمادي فاتح لتمييز الصفحة */
            display: flex;
            justify-content: center; /* توسيط الصورة بالعرض */
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 20px;
        }

        .image-container {
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* إضافة ظل خفيف للصورة */
            max-width: 100%;
        }

        img {
            max-width: 100%; /* لجعل الصورة تتناسب مع شاشات الهواتف */
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <!-- تأكد أن اسم الصورة هنا يطابق الاسم الذي حفظتها به -->
        <img src="student-info.jpg" alt="Student Information">
    </div>

</body>
</html>
